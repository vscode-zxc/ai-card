<h2>答题页面布局</h2>
<p class="subtitle">四宫格图片 + 题目 + 操作按钮，哪种布局分配更合理？（手机竖屏）</p>

<div class="split" style="gap:16px;align-items:flex-start">

  <!-- Layout A -->
  <div class="mockup" style="flex:1">
    <div class="mockup-header">A · 题目置顶，图片居中大图</div>
    <div class="mockup-body" style="background:#FEF9EF;border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px;min-height:400px">
      <div style="background:#FFD6E7;border-radius:10px;padding:8px 10px;text-align:center;font-size:12px;color:#c0306a">
        请选择 <span style="color:#e8003d;font-weight:bold">「白色的袜子」</span>？
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;flex:1">
        <div style="background:#B0E0FF;border-radius:8px;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:22px">🐱</div>
        <div style="background:#FFD6E7;border-radius:8px;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:22px;border:3px solid #e8003d">🧦</div>
        <div style="background:#B5EAD7;border-radius:8px;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:22px">🚌</div>
        <div style="background:#FFDAC1;border-radius:8px;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:22px">🏠</div>
      </div>
      <div style="display:flex;gap:6px">
        <div style="flex:1;background:#ddd;border-radius:8px;padding:7px;text-align:center;font-size:11px">退出</div>
        <div style="flex:1;background:#FFB6C1;border-radius:8px;padding:7px;text-align:center;font-size:11px;color:white">标记</div>
        <div style="flex:1;background:#ccc;border-radius:8px;padding:7px;text-align:center;font-size:11px;color:#999">下一题</div>
      </div>
    </div>
    <div class="card-body" style="padding:8px 0 0">
      <p>图片占约 70% 高度，按钮紧凑在底部，题目简洁一行。</p>
    </div>
  </div>

  <!-- Layout B -->
  <div class="mockup" style="flex:1">
    <div class="mockup-header">B · 题目带装饰卡片，按钮更大</div>
    <div class="mockup-body" style="background:#FFF0F7;border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px;min-height:400px">
      <div style="background:white;border-radius:14px;padding:10px;text-align:center;box-shadow:0 2px 8px rgba(255,150,180,.2)">
        <div style="font-size:10px;color:#aaa;margin-bottom:4px">🎯 第 3 题</div>
        <div style="font-size:12px;color:#555">请选择</div>
        <div style="font-size:15px;font-weight:bold;color:#e8003d;margin-top:2px">「白色的袜子」</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1">
        <div style="background:#B0E0FF;border-radius:10px;min-height:75px;display:flex;align-items:center;justify-content:center;font-size:20px">🐱</div>
        <div style="background:white;border-radius:10px;min-height:75px;display:flex;align-items:center;justify-content:center;font-size:20px;border:3px solid #FF69B4;box-shadow:0 0 10px rgba(255,105,180,.4)">🧦</div>
        <div style="background:#B5EAD7;border-radius:10px;min-height:75px;display:flex;align-items:center;justify-content:center;font-size:20px">🚌</div>
        <div style="background:#FFDAC1;border-radius:10px;min-height:75px;display:flex;align-items:center;justify-content:center;font-size:20px">🏠</div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:#f0f0f0;border-radius:12px;padding:9px;text-align:center;font-size:12px;color:#888">退出</div>
        <div style="flex:1;background:linear-gradient(135deg,#FFB6C1,#FFD700);border-radius:12px;padding:9px;text-align:center;font-size:12px;color:white;font-weight:bold">标记 ⭐</div>
        <div style="flex:1;background:#e0e0e0;border-radius:12px;padding:9px;text-align:center;font-size:12px;color:#bbb">下一题 →</div>
      </div>
    </div>
    <div class="card-body" style="padding:8px 0 0">
      <p>题目有卡片装饰和进度提示，按钮更圆润有质感，图片略小但更精致。</p>
    </div>
  </div>

</div>

<p class="subtitle" style="margin-top:12px">点击选择，或在终端说说你的偏好 📱</p>
